# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name soccerstyle.com.ec www.soccerstyle.com.ec;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name soccerstyle.com.ec www.soccerstyle.com.ec;

    # Certificados Let's Encrypt
    ssl_certificate     /etc/letsencrypt/live/soccerstyle.com.ec/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/soccerstyle.com.ec/privkey.pem;

    # TLS moderno
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;

    # Seguridad
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;

    root  /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # Proxy API al backend
    location /api/ {
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 10M;
    }

    # Swagger UI
    location ~ ^/(swagger-ui|openapi) {
        proxy_pass       http://backend:5000;
        proxy_set_header Host         $host;
        proxy_set_header X-Real-IP    $remote_addr;
    }

    # Assets estáticos con cache largo
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot|mp4)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
