services:
  postgres:
    image: postgres:16-alpine
    container_name: soccerstyle-postgres
    environment:
      POSTGRES_DB: soccerstyle
      POSTGRES_USER: soccerstyle_admin
      POSTGRES_PASSWORD: "SoccerStylePg_2026!v8x4K"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped
    networks:
      - soccerstyle-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: soccerstyle-backend
    env_file:
      - ./backend/.env
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
    command: ["sh", "-c", "pip install --no-cache-dir -r requirements.txt && python seed_admin.py && python app.py"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - soccerstyle-network

  soccerstyle_dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: soccerstyle-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app:cached
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - VITE_API_PROXY_TARGET=http://backend:5000
    command: ["sh", "-c", "npm install && npm run dev -- --host"]
    depends_on:
      - backend
    networks:
      - soccerstyle-network

networks:
  soccerstyle-network:
    driver: bridge

volumes:
  postgres_data:
