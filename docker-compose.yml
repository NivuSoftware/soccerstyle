services:
  postgres:
    image: postgres:16-alpine
    container_name: soccerstyle-postgres
    env_file:
      - ./backend/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped
    networks:
      - soccerstyle-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: soccerstyle-backend
    env_file:
      - ./backend/.env
    volumes:
      - product_images:/app/products
      - banner_images:/app/banners
    expose:
      - "5000"
    command: >
      sh -c "python seed_admin.py && gunicorn --bind 0.0.0.0:5000 --workers 4 --timeout 120 --access-logfile - app:app"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - soccerstyle-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: soccerstyle-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - soccerstyle-network

networks:
  soccerstyle-network:
    driver: bridge

volumes:
  postgres_data:
  product_images:
  banner_images:
