services:
  postgres:
    image: postgres:16-alpine
    container_name: soccerstyle-postgres
    env_file:
      - ./backend/.env
    command: >
      postgres
      -c shared_buffers=32MB
      -c work_mem=4MB
      -c maintenance_work_mem=32MB
      -c effective_cache_size=128MB
      -c max_connections=20
      -c checkpoint_completion_target=0.9
      -c wal_buffers=8MB
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - soccerstyle-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: soccerstyle-backend
    env_file:
      - ./backend/.env
    volumes:
      - product_images:/app/products
      - banner_images:/app/banners
    expose:
      - "5000"
    command: >
      sh -c "python seed_admin.py &&
             gunicorn
               --bind 0.0.0.0:5000
               --workers 2
               --timeout 120
               --max-requests 1000
               --max-requests-jitter 100
               --access-logfile -
               app:app"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 200M
    networks:
      - soccerstyle-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: soccerstyle-frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 48M
    networks:
      - soccerstyle-network

networks:
  soccerstyle-network:
    driver: bridge

volumes:
  postgres_data:
  product_images:
  banner_images:
